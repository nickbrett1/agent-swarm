version: 2.1
orbs:
  node: circleci/node@5.0.2
  doppler: conpago/doppler@1.3.5
  sonarcloud: sonarsource/sonarcloud@2.0.0

jobs:
  build:
    executor: node/default
    environment:
      SONAR_SCANNER_OPTS: "-Dproject.settings=.sonarcloud.properties"
      SONAR_TOKEN: $SONARQUBE_TOKEN
    steps:
      - checkout
      - run:
          name: Debug Environment Variable Names
          command: |
            env | cut -d= -f1 | sort
            echo "--- Testing SONARQUBE_TOKEN ---"
            curl -s -u "$SONARQUBE_TOKEN:" https://sonarcloud.io/api/users/current | jq -c '{isLoggedIn: .isLoggedIn, login: .login}'
            curl -s -u "$SONARQUBE_TOKEN:" "https://sonarcloud.io/api/organizations/search?member=true" | jq -c '.organizations[] | {key: .key, name: .name}'
      - restore_cache:
          keys:
            - v1-deps-{{ checksum "package.json" }}
            - v1-deps-
      - run:
          name: Install Packages
          command: |
            if [ -f package-lock.json ]; then
              npm ci
            else
              npm install
            fi
      - save_cache:
          paths:
            - node_modules
          key: v1-deps-{{ checksum "package.json" }}

      - doppler/install
      - run:
          name: Setup Wrangler Config
          command: |
            chmod +x scripts/setup-wrangler-config.sh
            ./scripts/setup-wrangler-config.sh
      - run:
          name: Build
          command: npm run build
      - sonarcloud/scan
      - run:
          name: Test
          command: npm run test


  deploy-to-cloudflare:
    executor: node/default
    parameters:
      environment:
        type: string
        default: "default"
      doppler_config:
        type: string
        default: "prod"
    steps:
      - checkout
      - restore_cache:
          keys:
            - v1-deps-{{ checksum "package.json" }}
            - v1-deps-
      - run:
          name: Install Packages
          command: |
            if [ -f package-lock.json ]; then
              npm ci
            else
              npm install
            fi
      - save_cache:
          paths:
            - node_modules
          key: v1-deps-{{ checksum "package.json" }}
      - doppler/install
      - run:
          name: Setup Wrangler Config
          environment:
            DOPPLER_CONFIG: << parameters.doppler_config >>
          command: |
            chmod +x scripts/setup-wrangler-config.sh
            ./scripts/setup-wrangler-config.sh "$DOPPLER_CONFIG"
      - run:
          name: Sync Doppler Secrets to Cloudflare
          environment:
            CLOUDFLARE_ENV: << parameters.environment >>
            DOPPLER_CONFIG: << parameters.doppler_config >>
          command: |
            chmod +x scripts/sync-doppler-secrets.sh
            if [ "$CLOUDFLARE_ENV" = "default" ] || [ -z "$CLOUDFLARE_ENV" ]; then
              ./scripts/sync-doppler-secrets.sh --config "$DOPPLER_CONFIG" --env "$CLOUDFLARE_ENV"
            else
              if ! ./scripts/sync-doppler-secrets.sh --config "$DOPPLER_CONFIG" --env "$CLOUDFLARE_ENV"; then
                echo "⚠️  Warning: Failed to sync secrets to Cloudflare preview."
              fi
            fi
      - run:
          name: Build
          command: npm run build
      - run:
          name: Deploy to Cloudflare Workers
          environment:
            CLOUDFLARE_ENV: << parameters.environment >>
          command: |
            if [ "$CLOUDFLARE_ENV" = "default" ] || [ -z "$CLOUDFLARE_ENV" ]; then
              npx wrangler deploy
            else
              npx wrangler deploy --env "$CLOUDFLARE_ENV"
            fi
workflows:
  build-and-test:
    jobs:
      - build:
          context: common


      - deploy-to-cloudflare:
          context: common
          environment: "default"
          doppler_config: "prod"
          requires:
            - build
          filters:
            branches:
              only: main
      - deploy-to-cloudflare:
          context: common
          name: deploy-to-cloudflare-preview
          environment: "preview"
          doppler_config: "stg"
          requires:
            - build
          filters:
            branches:
              ignore: main

