version: 2.1
orbs:
  node: circleci/node@5.0.2
  ggshield: gitguardian/ggshield@1

jobs:
  build:
    executor: node/default
    steps:
      - checkout
      - restore_cache:
          keys:
            - v1-deps-{{ checksum "package.json" }}
            - v1-deps-
      - run:
          name: Install Packages
          command: |
            if [ -f package-lock.json ]; then
              npm ci
            else
              npm install
            fi
      - save_cache:
          paths:
            - node_modules
          key: v1-deps-{{ checksum "package.json" }}

      - run:
          name: Setup Wrangler Config
          command: |
            chmod +x scripts/setup-wrangler-config.sh
            ./scripts/setup-wrangler-config.sh
      - run:
          name: Build
          command: npm run build


  deploy-to-cloudflare:
    executor: node/default
    parameters:
      environment:
        type: string
        default: ""
    steps:
      - checkout
      - restore_cache:
          keys:
            - v1-deps-{{ checksum "package.json" }}
            - v1-deps-
      - run:
          name: Install Packages
          command: |
            if [ -f package-lock.json ]; then
              npm ci
            else
              npm install
            fi
      - save_cache:
          paths:
            - node_modules
          key: v1-deps-{{ checksum "package.json" }}
      - run:
          name: Setup Wrangler Config
          command: |
            chmod +x scripts/setup-wrangler-config.sh
            ./scripts/setup-wrangler-config.sh
      - run:
          name: Build
          command: npm run build
      - run:
          name: Deploy to Cloudflare Workers
          command: |
            if [ -n "<< parameters.environment >>" ]; then
              npx wrangler deploy --env "<< parameters.environment >>"
            else
              npx wrangler deploy
            fi
workflows:
  build-and-test:
    jobs:
      - ggshield/scan:
          name: ggshield-scan
          context: common
          base_revision: << pipeline.git.base_revision >>
          revision: <<pipeline.git.revision>>

      - build:
          context: common
          requires:
            - ggshield-scan

      - deploy-to-cloudflare:
          name: deploy-preview
          context: common
          environment: "preview"
          requires:
            - build
          filters:
            branches:
              ignore: main

      - deploy-to-cloudflare:
          name: deploy-production
          context: common
          requires:
            - build
          filters:
            branches:
              only: main
