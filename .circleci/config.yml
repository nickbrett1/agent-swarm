version: 2.1
orbs:
  node: circleci/node@5.0.2
  doppler: conpago/doppler@1.3.5
  sonarcloud: sonarsource/sonarcloud@2.0.0

jobs:
  build:
    executor: node/default
    environment:
      SONAR_SCANNER_OPTS: "-Dproject.settings=.sonarcloud.properties"
    steps:
      - checkout
      - run:
          name: Export SonarCloud Token
          command: echo "export SONAR_TOKEN=\$SONARQUBE_TOKEN" >> $BASH_ENV
      - restore_cache:
          keys:
            - v1-deps-{{ checksum "package.json" }}
            - v1-deps-
      - run:
          name: Install Packages
          command: |
            if [ -f package-lock.json ]; then
              npm ci
            else
              npm install
            fi
      - save_cache:
          paths:
            - node_modules
          key: v1-deps-{{ checksum "package.json" }}

      - doppler/install
      - run:
          name: Setup Wrangler Config
          command: |
            chmod +x scripts/setup-wrangler-config.sh
            ./scripts/setup-wrangler-config.sh
      - run:
          name: Build
          command: npm run build
      - sonarcloud/scan
      - run:
          name: Test
          command: npm run test


  deploy-to-cloudflare:
    executor: node/default
    parameters:
      environment:
        type: string
        default: "default"
      doppler_config:
        type: string
        default: "prod"
    steps:
      - checkout
      - restore_cache:
          keys:
            - v1-deps-{{ checksum "package.json" }}
            - v1-deps-
      - run:
          name: Install Packages
          command: |
            if [ -f package-lock.json ]; then
              npm ci
            else
              npm install
            fi
      - save_cache:
          paths:
            - node_modules
          key: v1-deps-{{ checksum "package.json" }}
      - doppler/install
      - run:
          name: Setup Wrangler Config
          environment:
            DOPPLER_CONFIG: << parameters.doppler_config >>
          command: |
            chmod +x scripts/setup-wrangler-config.sh
            ./scripts/setup-wrangler-config.sh "$DOPPLER_CONFIG"
      - run:
          name: Sync Doppler Secrets to Cloudflare
          environment:
            CLOUDFLARE_ENV: << parameters.environment >>
            DOPPLER_CONFIG: << parameters.doppler_config >>
          command: |
            chmod +x scripts/sync-doppler-secrets.sh
            if ! ./scripts/sync-doppler-secrets.sh --config "$DOPPLER_CONFIG" --env "$CLOUDFLARE_ENV"; then
              echo "⚠️  Warning: Failed to sync secrets to Cloudflare. Using existing secrets."
            fi
      - run:
          name: Build
          command: npm run build
      - run:
          name: Deploy to Cloudflare Workers
          command: |
            ENV_VAL="<< parameters.environment >>"
            if [ "$ENV_VAL" = "preview" ]; then
              npx wrangler deploy --env "$ENV_VAL"
            else
              npx wrangler deploy
            fi
workflows:
  build-and-test:
    jobs:
      - build:
          context: common


      - deploy-to-cloudflare:
          context: common
          environment: "default"
          doppler_config: "prod"
          requires:
            - build
          filters:
            branches:
              only: main
      - deploy-to-cloudflare:
          context: common
          name: deploy-to-cloudflare-preview
          environment: "preview"
          doppler_config: "stg"
          requires:
            - build
          filters:
            branches:
              ignore: main

